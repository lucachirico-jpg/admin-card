<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Pannello di Controllo</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --cgc-yellow: #fdd835;
            --cgc-red: #e53935;
            --cgc-blue: #0088cc;
            --bg-black: #000000;
        }

        body {
            margin: 0;
            background-color: var(--bg-black);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: var(--cgc-yellow);
            padding: 25px 20px;
            text-align: center;
            color: black;
            border-bottom: 6px solid #000;
            border-radius: 0 0 40px 40px;
            z-index: 10;
        }

        .logo-main { width: 60px; height: auto; margin-bottom: 5px; }
        .welcome-msg { font-size: 22px; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: -1px; }

        /* SEZIONE CONTENUTO */
        .content-section { 
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center; 
            padding: 30px 20px 120px 20px;
        }

        .scanner-box {
            width: 90%;
            background: #111;
            border: 2px solid var(--cgc-yellow);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(253, 216, 53, 0.15);
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .scanner-box:active { transform: scale(0.98); }

        .qr-icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px auto;
        }

        .qr-icon-wrapper img { width: 45px; height: 45px; }
        .scan-label { font-weight: 900; font-size: 13px; text-transform: uppercase; margin: 0; letter-spacing: 1px; }

        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            display: none;
            border: 1px solid #333;
            margin-bottom: 10px;
        }

        /* FOOTER */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 450px;
            background: #080808;
            border-top: 3px solid var(--cgc-yellow);
            display: flex;
            justify-content: center;
            padding: 20px 5px;
            z-index: 100;
        }

        .exit-btn {
            text-decoration: none;
            text-align: center;
            background: none;
            border: none;
            cursor: pointer;
        }

        .footer-icon-exit { 
            width: 45px; height: 45px; 
            border-radius: 50%; 
            background: var(--cgc-red);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(229, 57, 53, 0.3);
            margin: 0 auto;
        }

        .footer-label-exit { 
            font-size: 9px; 
            color: var(--cgc-red); 
            display: block; 
            margin-top: 8px; 
            font-weight: 900; 
            text-transform: uppercase; 
        }

    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="2025.png" class="logo-main" alt="Logo">
        <h1 class="welcome-msg">PANNELLO DI CONTROLLO</h1>
    </div>

    <div class="content-section">
        
        <div class="scanner-box" id="box-scanner">
            <div id="reader"></div>
            <div id="scan-trigger" onclick="iniziaScansione()">
                <div class="qr-icon-wrapper" style="background: var(--cgc-yellow);">
                    <img src="https://img.icons8.com/ios-filled/100/000000/qr-code.png">
                </div>
                <p class="scan-label" style="color: var(--cgc-yellow);">CLICCA PER SCANSIONARE</p>
            </div>
        </div>

        <div class="scanner-box" onclick="location.href='notifiche.html'">
            <div class="qr-icon-wrapper" style="background: var(--cgc-blue);">
                <img src="https://img.icons8.com/ios-filled/100/ffffff/paper-plane.png">
            </div>
            <p class="scan-label" style="color: var(--cgc-blue);">INVIA NOTIFICHE</p>
        </div>

        <div class="scanner-box" onclick="location.href='statistiche.html'">
            <div class="qr-icon-wrapper" style="background: white;">
                <img src="https://img.icons8.com/ios-filled/100/000000/bar-chart.png">
            </div>
            <p class="scan-label" style="color: white;">STATISTICHE</p>
        </div>

    </div>

    <div class="footer">
        <a href="index.html" class="exit-btn">
            <div class="footer-icon-exit">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/exit.png" style="width:22px;">
            </div>
            <span class="footer-label-exit">ESCI DALL'APP</span>
        </a>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCOQzqZrGbyVsQLyiF6d9C_ZkTkKPo6rew",
        authDomain: "tesserafedelta-afe51.firebaseapp.com",
        databaseURL: "https://tesserafedelta-afe51-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tesserafedelta-afe51",
        storageBucket: "tesserafedelta-afe51.firebasestorage.app",
        messagingSenderId: "277445209812",
        appId: "1:277445209812:web:d0e4207692ba09973fd541"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const database = firebase.database();

    function iniziaScansione() {
        document.getElementById('scan-trigger').style.display = 'none';
        document.getElementById('reader').style.display = 'block';

        const html5QrCode = new Html5Qrcode("reader");
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            (decodedText) => {
                // Rilevato codice! Fermiamo lo scanner e carichiamo l'utente
                html5QrCode.stop().then(() => {
                    caricaUtente(decodedText.trim());
                });
            },
            (errorMessage) => { }
        ).catch((err) => {
            alert("Errore fotocamera: " + err);
            resetScanner();
        });
    }

    function caricaUtente(uid) {
        // Verifichiamo subito l'esistenza su Firebase
        database.ref('utenti/' + uid).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                // REINDIRIZZAMENTO IMMEDIATO: No alert, si va dritti al profilo
                window.location.href = "scheda-cliente.html?id=" + uid;
            } else {
                alert("CLIENTE NON TROVATO: Il codice scansionato non è valido.");
                resetScanner();
            }
        }).catch((error) => {
            console.error(error);
            alert("Errore di connessione al database.");
            resetScanner();
        });
    }

    function resetScanner() {
        document.getElementById('scan-trigger').style.display = 'block';
        document.getElementById('reader').style.display = 'none';
    }
</script>

</body>
</html>
