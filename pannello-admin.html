<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Pannello di Controllo</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --cgc-yellow: #fdd835;
            --cgc-red: #e53935;
            --bg-black: #000000;
        }

        body {
            margin: 0;
            background-color: var(--bg-black);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding-bottom: 110px;
            min-height: 100vh;
        }

        /* HEADER MODIFICATO */
        .header {
            background: var(--cgc-yellow);
            padding: 25px 20px;
            text-align: center;
            color: black;
            border-bottom: 6px solid #000;
            border-radius: 0 0 40px 40px;
            position: relative;
        }

        .logo-main { width: 60px; height: auto; margin-bottom: 5px; }
        .welcome-msg { font-size: 22px; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: -1px; }

        /* BOX SCANNER CENTRATO 90% */
        .content-section { 
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .scanner-box {
            width: 90%;
            background: #111;
            border: 2px solid var(--cgc-yellow);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(253, 216, 53, 0.15);
        }

        .qr-icon-wrapper {
            width: 100px;
            height: 100px;
            background: var(--cgc-yellow);
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .qr-icon-wrapper img { width: 60px; height: 60px; }

        .scan-label {
            color: var(--cgc-yellow);
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            margin: 0;
        }

        #reader {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            display: none;
            border: 1px solid #333;
        }

        /* FOOTER CON TASTO ESCI */
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 450px;
            background: #080808;
            border-top: 3px solid var(--cgc-yellow);
            display: flex;
            justify-content: space-evenly;
            padding: 15px 5px;
            z-index: 100;
        }

        .footer-link { text-decoration: none; text-align: center; }
        .footer-icon { 
            width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; 
            display: flex; align-items: center; justify-content: center; 
        }
        .footer-label { font-size: 7px; color: white; display: block; margin-top: 5px; font-weight: bold; text-transform: uppercase; }

    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <img src="2025.png" class="logo-main" alt="Logo">
        <h1 class="welcome-msg">PANNELLO DI CONTROLLO</h1>
    </div>

    <div class="content-section">
        <div class="scanner-box">
            <div id="reader"></div>
            
            <div id="scan-trigger">
                <div class="qr-icon-wrapper" onclick="iniziaScansione()">
                    <img src="https://img.icons8.com/ios-filled/100/000000/qr-code.png">
                </div>
                <p class="scan-label">CLICCA PER SCANSIONARE</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="https://lideachetimanca.com" class="footer-link">
            <div class="footer-icon" style="background:white;"><img src="2025.png" style="width:30px; border-radius:50%;"></div>
            <span class="footer-label">SITO WEB</span>
        </a>
        
        <a href="index.html" class="footer-link">
            <div class="footer-icon" style="background:var(--cgc-red); border-color:var(--cgc-red);">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/exit.png" style="width:20px;">
            </div>
            <span class="footer-label" style="color:var(--cgc-red);">ESCI DALL'APP</span>
        </a>

        <a href="https://wa.me/390293906481" class="footer-link">
            <div class="footer-icon" style="background:#25D366;"><img src="whatsapp.png" style="width:25px;"></div>
            <span class="footer-label">ASSISTENZA</span>
        </a>
    </div>
</div>

<script>
    // Inizializzazione Firebase (Tua Configurazione)
    const firebaseConfig = {
        apiKey: "AIzaSyCOQzqZrGbyVsQLyiF6d9C_ZkTkKPo6rew",
        authDomain: "tesserafedelta-afe51.firebaseapp.com",
        databaseURL: "https://tesserafedelta-afe51-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "tesserafedelta-afe51",
        storageBucket: "tesserafedelta-afe51.firebasestorage.app",
        messagingSenderId: "277445209812",
        appId: "1:277445209812:web:d0e4207692ba09973fd541"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const database = firebase.database();

    function iniziaScansione() {
        document.getElementById('scan-trigger').style.display = 'none';
        document.getElementById('reader').style.display = 'block';

        const html5QrCode = new Html5Qrcode("reader");
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: 250 },
            (decodedText) => {
                // Quando scansiona, ferma la camera e cerca l'utente
                html5QrCode.stop().then(() => {
                    caricaUtente(decodedText);
                });
            },
            (errorMessage) => { /* scansione in corso... */ }
        ).catch((err) => {
            alert("Errore fotocamera: " + err);
            resetScanner();
        });
    }

    function caricaUtente(uid) {
        // Qui verifichiamo se l'ID esiste su Firebase
        database.ref('utenti/' + uid).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const user = snapshot.val();
                alert("CLIENTE TROVATO: " + user.nome + "\nBollini: " + (user.bollini || 0));
                // Qui poi aggiungeremo la funzione per aggiungere il punto
                resetScanner();
            } else {
                alert("ERRORE: QR Code non valido o cliente non registrato.");
                resetScanner();
            }
        });
    }

    function resetScanner() {
        document.getElementById('scan-trigger').style.display = 'block';
        document.getElementById('reader').style.display = 'none';
    }
</script>

</body>
</html>
